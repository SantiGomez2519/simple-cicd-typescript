<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
</head>
<body>
  <h1>Simple Calculator</h1>
  <input type="number" id="num1" placeholder="First number" />
  <input type="number" id="num2" placeholder="Second number" />

  <div>
    <button type="button" id="btnSum">Sum</button>
    <button type="button" id="btnSubstract">Substract</button>
    <button type="button" id="btnMultiply">Multiply</button>
    <button type="button" id="btnDivide">Divide</button>
  </div>

  <p>Result: <strong id="result">—</strong></p>

  <!-- Link to the compiled JS files (compile each .ts with: tsc <file>.ts) -->
  <script src="sum.js"></script>
  <script src="substract.js"></script>
  <script src="multiply.js"></script>
  <script src="divide.js"></script>
  <script>
    (function () {
      var num1Input = document.getElementById('num1');
      var num2Input = document.getElementById('num2');
      var resultElement = document.getElementById('result');

      function getValues() {
        var a = Number(num1Input.value) || 0;
        var b = Number(num2Input.value) || 0;
        return { a: a, b: b };
      }

      document.getElementById('btnSum').addEventListener('click', function () {
        var values = getValues();
        resultElement.textContent = window.sum(values.a, values.b);
      });

      document.getElementById('btnSubstract').addEventListener('click', function () {
        var values = getValues();
        resultElement.textContent = window.substract(values.a, values.b);
      });

      document.getElementById('btnMultiply').addEventListener('click', function () {
        var values = getValues();
        resultElement.textContent = window.multiply(values.a, values.b);
      });

      document.getElementById('btnDivide').addEventListener('click', function () {
        var values = getValues();
        try {
          resultElement.textContent = window.divide(values.a, values.b);
        } catch (e) {
          resultElement.textContent = 'Error: ' + (e && e.message ? e.message : 'Invalid division');
        }
      });
    })();
  </script>
</body>
</html>
